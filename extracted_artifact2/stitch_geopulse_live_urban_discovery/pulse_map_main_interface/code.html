<style>
        .glass-overlay {
            background-color: rgba(38, 38, 39, 0.4); /* surface-container-highest */
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        
        .ghost-border {
            border: 1px solid rgba(72, 72, 73, 0.15); /* outline-variant */
        }
        
        .pulse-marker {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #8ff5ff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 16px rgba(143, 245, 255, 0.6);
        }
        
        .pulse-ring {
            position: absolute;
            width: 48px;
            height: 48px;
            border: 2px solid rgba(0, 222, 236, 0.4);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }
        
        .marker-secondary {
            background-color: #bb00fd;
            box-shadow: 0 0 16px rgba(187, 0, 253, 0.6);
        }
        
        .pulse-ring-secondary {
            border-color: rgba(214, 116, 255, 0.4);
        }

        /* Hide scrollbar for category pills */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>

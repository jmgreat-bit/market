<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GeoPulse - Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;900&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#390050",
                        "surface-dim": "#0e0e0f",
                        "surface-tint": "#8ff5ff",
                        "primary": "#8ff5ff",
                        "surface-container-high": "#201f21",
                        "error": "#ff716c",
                        "background": "#0e0e0f",
                        "primary-fixed": "#00eefc",
                        "on-tertiary-fixed": "#39000d",
                        "surface-container-highest": "#262627",
                        "on-tertiary-container": "#000000",
                        "on-surface": "#ffffff",
                        "surface-bright": "#2c2c2d",
                        "on-surface-variant": "#adaaab",
                        "on-secondary-fixed": "#580079",
                        "on-primary": "#005d63",
                        "on-error-container": "#ffa8a3",
                        "primary-fixed-dim": "#00deec",
                        "surface-container": "#1a191b",
                        "secondary": "#d674ff",
                        "on-primary-fixed-variant": "#005e64",
                        "secondary-container": "#9800d0",
                        "on-secondary-fixed-variant": "#8300b3",
                        "secondary-fixed": "#f0c1ff",
                        "surface-container-lowest": "#000000",
                        "error-dim": "#d7383b",
                        "tertiary-container": "#fd3b66",
                        "secondary-fixed-dim": "#eaaeff",
                        "primary-dim": "#00deec",
                        "surface-variant": "#262627",
                        "on-primary-container": "#005359",
                        "surface-container-low": "#131314",
                        "inverse-on-surface": "#565556",
                        "tertiary": "#ff6e84",
                        "tertiary-fixed": "#ff909d",
                        "secondary-dim": "#bb00fd",
                        "on-primary-fixed": "#003f43",
                        "inverse-surface": "#fcf8f9",
                        "inverse-primary": "#006a71",
                        "outline-variant": "#484849",
                        "on-tertiary": "#490013",
                        "on-error": "#490006",
                        "on-background": "#ffffff",
                        "outline": "#767576",
                        "on-tertiary-fixed-variant": "#780025",
                        "error-container": "#9f0519",
                        "tertiary-fixed-dim": "#ff788b",
                        "surface": "#0e0e0f",
                        "primary-container": "#00eefc",
                        "tertiary-dim": "#ff6e84",
                        "on-secondary-container": "#fff5fc"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden font-body antialiased">
<!-- Abstract Topographical Background -->
<div class="absolute inset-0 z-0 bg-[url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&amp;w=2070&amp;auto=format&amp;fit=crop')] bg-cover bg-center opacity-[0.15] mix-blend-screen" data-alt="abstract dark topographical map with subtle glowing cyan contour lines on an obsidian background, high tech midnight aesthetic, top down perspective"></div>
<!-- Ambient Radial Gradient for Depth -->
<div class="absolute inset-0 z-10 bg-[radial-gradient(circle_at_center,transparent_0%,theme('colors.surface')_80%)]"></div>
<div class="absolute inset-0 z-10 bg-[radial-gradient(ellipse_at_top,rgba(143,245,255,0.05)_0%,transparent_50%)]"></div>
<!-- Main Content Canvas -->
<main class="relative z-20 w-full max-w-md px-6 flex flex-col items-center">
<!-- Brand Anchor -->
<div class="mb-12 text-center flex flex-col items-center">
<div class="w-16 h-16 rounded-full border border-outline-variant/30 bg-surface-container/50 backdrop-blur-md flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(143,245,255,0.15)] relative">
<div class="absolute inset-0 rounded-full animate-ping opacity-20 bg-primary-dim"></div>
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">explore</span>
</div>
<h1 class="font-headline font-black text-5xl tracking-[0.15em] text-primary drop-shadow-[0_0_12px_rgba(143,245,255,0.5)]">GEOPULSE</h1>
<p class="font-headline text-on-surface-variant tracking-[0.3em] text-xs mt-3 uppercase font-medium">System Access</p>
</div>
<!-- Glassmorphic Login Card -->
<div class="w-full bg-surface-container-highest/40 backdrop-blur-[32px] rounded-xl p-8 border border-outline-variant/15 shadow-[0_16px_40px_-10px_rgba(0,0,0,0.8),0_0_20px_rgba(143,245,255,0.03)]">
<form action="#" class="space-y-8" method="POST">
<!-- Email Input -->
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 pl-10 pr-0 py-3 text-on-surface font-body placeholder:text-on-surface-variant/50 focus:ring-0 focus:border-primary transition-all outline-none" id="email" name="email" placeholder="Pulse ID / Email" required="" type="email"/>
</div>
<!-- Password Input -->
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 pl-10 pr-0 py-3 text-on-surface font-body placeholder:text-on-surface-variant/50 focus:ring-0 focus:border-primary transition-all outline-none" id="password" name="password" placeholder="Passcode" required="" type="password"/>
<button class="absolute right-0 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-sm">visibility_off</span>
</button>
</div>
<div class="flex items-center justify-between pt-2">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant/30 bg-transparent text-primary focus:ring-primary focus:ring-offset-surface-container bg-surface-container-low" type="checkbox"/>
<span class="font-body text-xs text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-body text-xs text-primary hover:text-primary-container transition-colors drop-shadow-[0_0_8px_rgba(143,245,255,0.2)]" href="#">Lost Access?</a>
</div>
<!-- Primary Action Button -->
<button class="w-full relative overflow-hidden group bg-gradient-to-r from-primary to-primary-container text-on-primary-fixed font-headline font-bold text-lg py-4 rounded-full shadow-[0_0_20px_rgba(143,245,255,0.2)] hover:shadow-[0_0_30px_rgba(143,245,255,0.4)] transition-all duration-300 transform active:scale-[0.98]" type="submit">
<span class="relative z-10 flex items-center justify-center gap-2">
                        Sign In
                        <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</span>
<!-- Hover Glow Effect -->
<div class="absolute inset-0 bg-white/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
</form>
<!-- Secondary Action -->
<div class="mt-8 text-center border-t border-outline-variant/10 pt-6">
<p class="font-body text-sm text-on-surface-variant">
                    No active coordinates? 
                    <a class="font-headline font-semibold text-primary hover:text-primary-container ml-1 transition-colors drop-shadow-[0_0_8px_rgba(143,245,255,0.2)] hover:underline underline-offset-4 decoration-primary/50" href="#">Join the Pulse</a>
</p>
</div>
</div>
</main>
</body></html>
